<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- 모바일 반응형을 위한 뷰포트 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <!-- CSS를 사용해 HTML에 스타일을 적용할겁니다! -->
  <style>
    /* -------------------------------
        1. 커스텀 폰트 불러오기
        CDN을 통해 외부 폰트를 로드
        font-display: swap → 폰트 로딩 전에도 텍스트 표시
        ↓ 밑에 따라치기 ↓
      -------------------------------- */



    /* --------------------------------
        2. 모든 요소의 padding, border를 width 계산에 포함 
        ↓ 밑에 따라치기 ↓
    --------------------------------*/



    /* -------------------------------
        3. 전체 배경 레이아웃
        화면 전체를 고정 배경으로 설정
        ↓ 밑에 따라치기 ↓
      -------------------------------- */




    /* 왼쪽 입력 영역 */
    .left-wrapper {
      border: 4px solid #595959;
      border-radius: 20px;
      background-color: #ffffff;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;

      width: 100%;
      max-width: 1000px;
      padding: 36px;
      height: 100%;
    }

    /* 오른쪽 결과 영역 */
    .right-wrapper {
      border: 4px solid #595959;
      border-radius: 20px;
      background-color: #ffffff;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;

      width: 100%;
      max-width: 400px;
      padding: 36px;
      height: 100%;
    }

    /* 왼쪽 + 오른쪽 전체 감싸는 영역 */
    .all-wrapper {
      width: 100%;
      display: flex;
      gap: 40px;
      align-items: center;
      height: 640px;
    }

    /* 입력창 스타일 */
    .input {
      font-family: 'OngleipParkDahyeon';
      font-size: 24px;
      font-weight: 400;
      color: #000000;
      padding: 12px 20px;
      border-radius: 20px;
      border: 4px solid #d6d6d6;
      width: 100%;
      max-width: 400px;
    }

    /* 웹캠 원형 프레임 */
    .webcam-photo {
      width: 280px;
      height: 280px;
      border-radius: 200px;
      /* 원형 */
      border: 8px solid #595959;
      cursor: pointer;
    }

    /* 웹캠 촬영 버튼 */
    .webcam-button {
      padding: 12px;
      border: 6px solid #595959;
      display: flex;
      align-items: center;
      border-radius: 100px;
      cursor: pointer;
    }

    /* 포토카드 생성 버튼 */
    .create-photocard-button {
      font-family: 'OngleipParkDahyeon';
      padding: 12px 70px;
      border-radius: 20px;
      background-color: #d6d6d6;
      color: #595959;
      font-size: 32px;
      border: none;
    }

    .webcam-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    /* 완성된 포토카드 사진 영역 */
    .photo {
      width: 100%;
      max-width: 400px;
      height: 660px;
      border-radius: 10px;
      border: 1px solid #000000;
    }

    /* 포토카드 이름 텍스트 */
    .name {
      font-family: 'OngleipParkDahyeon';
      font-size: 40px;
      font-weight: 600;
      color: #595959;
    }
  </style>
  <!-- 스타일 끝! -->
</head>

<body>
  <!-- 전체 배경 -->
  <div class="background">
    <img class="logo" src="/assets/logo.svg" alt="logo" />

    <div class="all-wrapper">
      <!-- 왼쪽: 입력 & 촬영 -->
      <div class="left-wrapper">
        <!-- 
        --------------------------------
          4. 포토카드 이름 입력창
          ↓ 밑에 따라치기 ↓
        --------------------------------
        -->




        <!-- 웹캠 영역 -->
        <div class="webcam-wrapper">
          <div class="webcam-photo"></div>

          <!-- 
          --------------------------------
            5. 포토카드 촬영 버튼
            ↓ 밑에 따라치기 ↓
          --------------------------------
          -->



        </div>

        <!-- 포토카드 생성 버튼 -->
        <button class="create-photocard-button">포토카드 생성하기</button>
      </div>

      <!-- 
        --------------------------------
          6. 포토카드 결과 섹션
          ↓ 밑에 따라치기 ↓
        --------------------------------
      -->



    </div>
  </div>

  <!-- JS로 기능 구현! -->
  <script>
    /* -------------------------------
      1. DOM 요소 선택
      querySelector로 필요한 요소들을 변수에 저장
      ↓ 밑에 따라치기(복사 붙여넣기 권장) ↓
    -------------------------------- */



    let stream;

    /* -------------------------------
      2. video 태그를 JS로 생성
      HTML에 직접 쓰지 않고 동적으로 생성
    -------------------------------- */
    let video = document.createElement('video');
    video.autoplay = true; // 자동 재생
    video.playsInline = true; // 모바일에서 전체화면 방지
    video.style.width = '100%';
    video.style.height = '100%';
    video.style.borderRadius = '200px';
    video.style.objectFit = 'cover';
    video.style.transform = 'scaleX(-1)';
    // 거울처럼 보이도록 좌우 반전

    /* -------------------------------
      3. 웹캠 초기화 함수
      getUserMedia로 카메라 권한 요청
    -------------------------------- */
    async function initWebcam() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream; // 비디오에 스트림 연결
        videoContainer.appendChild(video); // 화면에 추가
      } catch (err) {
        console.error('웹캠 접근 실패:', err);
      }
    }

    // 페이지 로드 시 웹캠 실행
    initWebcam();

    /* -------------------------------
      4. 촬영 버튼 클릭 시
      canvas에 현재 프레임을 그려 이미지로 변환
      ↓ 밑에 따라치기 ↓
    -------------------------------- */




    /* -------------------------------
      5. 포토카드 생성 버튼 클릭
      저장된 이미지 + 입력한 이름을 화면에 표시
      ↓ 밑에 따라치기 ↓
    -------------------------------- */




  </script>
</body>

</html>
